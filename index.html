<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawBoard Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
    <button class="tbtn active" data-tool="select" title="선택 (V)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 1L13 7.5L8 8.7L5.5 14L2 1Z" stroke-linejoin="round"/></svg>
    </button>
    <button class="tbtn" data-tool="pen" title="펜 (P)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.5 1.5L13.5 4.5L5.5 12.5L1.5 13.5L2.5 9.5L10.5 1.5Z" stroke-linejoin="round"/></svg>
    </button>
    <button class="tbtn" data-tool="eraser" title="지우개 (E)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 11L6 4L12 7L8 13H3L2 11Z" stroke-linejoin="round"/><line x1="2" y1="13" x2="13" y2="13"/></svg>
    </button>
    <button class="tbtn" data-tool="connect" title="연결선 (C)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="3" cy="7.5" r="2"/><circle cx="12" cy="7.5" r="2"/><path d="M5 7.5 C6.5 4.5, 8.5 10.5, 10 7.5" fill="none"/></svg>
    </button>
    <div class="sep"></div>
    <div class="clr-wrap">
        <input type="color" class="clr-inp" id="sc" value="#58a6ff" title="선 색상">
        <span>선색</span>
    </div>
    <div class="clr-wrap">
        <input type="color" class="clr-inp" id="fc" value="#21262d" title="채우기">
        <span>채우기</span>
    </div>
    <div class="sep"></div>
    <div class="sw-wrap">
        <span>굵기</span>
        <div class="sw-row">
            <input type="range" class="swr" id="sw" min="1" max="20" value="2">
            <span class="sw-v" id="swv">2</span>
        </div>
    </div>
    <div class="sep"></div>
    <button class="tbtn" id="btn-del" title="선택 삭제 (Del)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="3" y1="3" x2="12" y2="12"/><line x1="12" y1="3" x2="3" y2="12"/></svg>
    </button>
    <button class="tbtn" id="btn-clear" title="전체 지우기">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4.5H12M5.5 4.5V3H9.5V4.5M6 4.5L6.5 12H8.5L9 4.5"/></svg>
    </button>
    <div class="logo">Draw<b>Board</b></div>
</div>

<div id="main">
    <div id="spanel"><div class="plabel">도형</div></div>
    <div id="cvwrap">
        <svg id="cv" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="sg" width="24" height="24" patternUnits="userSpaceOnUse">
                    <path d="M24 0L0 0 0 24" fill="none" stroke="#1c2128" stroke-width="1"/>
                </pattern>
                <pattern id="lg" width="120" height="120" patternUnits="userSpaceOnUse">
                    <rect width="120" height="120" fill="url(#sg)"/>
                    <path d="M120 0L0 0 0 120" fill="none" stroke="#252c36" stroke-width="1.5"/>
                </pattern>
                <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0,9 3,0 6" fill="#58a6ff"/>
                </marker>
                <marker id="arr-sel" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0,9 3,0 6" fill="#3fb950"/>
                </marker>
            </defs>
            <rect id="cvbg" width="100%" height="100%" fill="url(#lg)" pointer-events="all"/>
            <g id="lp"></g>
            <g id="lc"></g>
            <g id="ls"></g>
            <g id="lt"></g>
        </svg>
    </div>
</div>

<div id="sb">
    <span>🖱 <b id="spos">0, 0</b></span>
    <span>⚙ <b id="stool">선택 모드</b></span>
    <span>📊 도형 <b id="scnt">0</b> · 경로 <b id="pcnt">0</b> · 연결 <b id="ccnt">0</b></span>
    <span style="margin-left:auto">우클릭 = 지우개 · Del = 삭제 · 더블클릭 = 이름 변경</span>
</div>

<div id="ghost"></div>

<script src="shapes.js"></script>
<script src="app.js"></script>
</body>
</html>
